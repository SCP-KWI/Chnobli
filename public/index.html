<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chnobli</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0" />
<link rel="stylesheet" href="/css/chalk-tokens.css">
<link rel="stylesheet" href="/css/app.css">
<style>
  .landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:24px}
  .landing h1{font:700 clamp(28px,5vw,40px)/1.15 'Source Sans 3';letter-spacing:-.02em;margin:0}
  .landing p{color:var(--muted);max-width:440px;text-align:center;margin:0;line-height:1.5}
  .choices{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;max-width:640px}
  .choice{flex:1;min-width:230px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:26px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;text-decoration:none;color:var(--ink)}
  .choice:hover{border-color:var(--accent)}
  .choice .icon{width:52px;height:52px;border-radius:16px;background:var(--accent-tint);color:var(--accent-ink);display:grid;place-items:center}
  .choice .icon .mi{font-size:28px}
  .choice h3{margin:0;font-size:17px}
  .choice p{font-size:13px;color:var(--muted);margin:0}
</style>
</head>
<body>
<div class="landing">
  <div style="display:flex;align-items:center;gap:10px">
    <span class="badge-icon"><span class="mi" style="font-size:19px">quiz</span></span>
    <h1>Chnobli</h1>
  </div>
  <p>The class writes the questions. Everyone else plays them live.</p>
  <div class="choices">
    <a class="choice" href="/teacher">
      <span class="icon"><span class="mi">cast</span></span>
      <h3>I'm the teacher</h3>
      <p>Create a quiz, review questions, run the presentation.</p>
    </a>
    <a class="choice" href="/play">
      <span class="icon"><span class="mi">smartphone</span></span>
      <h3>I'm a student</h3>
      <p>Join with the code or QR on the board.</p>
    </a>
  </div>
</div>
</body>
</html>
