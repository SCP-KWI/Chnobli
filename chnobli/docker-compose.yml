version: "3.9"
services:
  chnobli:
    build: .
    container_name: chnobli
    restart: unless-stopped
    environment:
      - PORT=3000
      - QUESTION_DURATION_MS=20000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nginxproxymanager_default
networks:
  nginxproxymanager_default:
    external: true
